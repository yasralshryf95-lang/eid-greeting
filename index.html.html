<title>تهنئة عيد الفطر - شركة ساطع</title>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:'Tajawal',sans-serif;
background:#f5efe6;
color:#4d3a26;
}

.container{
width:min(100%,980px);
margin:auto;
background:white;
border-radius:24px;
box-shadow:0 14px 40px rgba(0,0,0,.08);
padding:24px;
}

.main-title{
margin:0;
font-family:'Cairo',sans-serif;
font-size:clamp(24px,4vw,38px);
font-weight:800;
background:linear-gradient(90deg,#7e5a21,#d4af37,#7e5a21);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
text-align:center;
}

.company-subtitle{
margin-top:8px;
text-align:center;
color:#8a6a3a;
font-weight:700;
font-size:clamp(14px,2vw,18px);
}

.preview-card{display:flex;justify-content:center;margin-top:20px;}

.image-box{position:relative;width:min(100%,720px);}

.image-box img{width:100%;height:auto;border-radius:18px;}

/* نسخة الكمبيوتر - بدون أي تعديل */
#nameOverlay{
position:absolute;
left:50%;
transform:translateX(-50%);
bottom:calc(14.7% - 45px);
width:33.2%;
text-align:center;
font-family:'Cairo',sans-serif;
font-weight:800;
font-size:25px;
color:#8a6422;
white-space:nowrap;
pointer-events:none;
}

/* نسخة الجوال فقط: رفع النص 7 بكسل إضافية للأعلى */
@media(max-width:640px){
#nameOverlay{
font-size:15px;
bottom:calc(14.7% - 18px);
}
}

.controls{
width:min(100%,520px);
margin:22px auto 0;
display:grid;
gap:12px;
}

#nameInput{
height:52px;
border-radius:14px;
border:1px solid rgba(184,138,59,.3);
padding:0 16px;
font-size:16px;
text-align:center;
font-family:'Tajawal',sans-serif;
}

button{
min-height:52px;
border:none;
border-radius:16px;
font-family:'Cairo',sans-serif;
font-size:17px;
font-weight:800;
color:#fff;
cursor:pointer;
background:linear-gradient(135deg,#7e5a21,#c79b43,#e0bc67,#b6852f,#7e5a21);
}
</style>
</head>

<input type="text" id="nameInput" placeholder="اكتب الاسم هنا"
oninput="document.getElementById('nameOverlay').textContent=this.value">
<button onclick="downloadGreeting()">تنزيل التهنئة</button>

</div>

<script>
async function downloadGreeting(){
const img=document.getElementById("preview");
const name=document.getElementById("nameOverlay").textContent||"";

await document.fonts.ready;

const canvas=document.createElement("canvas");
const ctx=canvas.getContext("2d");

canvas.width=img.naturalWidth;
canvas.height=img.naturalHeight;

ctx.drawImage(img,0,0,canvas.width,canvas.height);

ctx.textAlign="center";
ctx.textBaseline="middle";
ctx.direction="rtl";
ctx.fillStyle="#8a6422";
ctx.font="800 25px Cairo";

ctx.fillText(name,canvas.width/2,canvas.height-181);

const link=document.createElement("a");
link.download="eid_greeting.png";
link.href=canvas.toDataURL("image/png");
link.click();
}
</script>
