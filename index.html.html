
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تهنئة عيد الفطر - شركة ساطع</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&family=Cairo:wght@700;800&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:'Tajawal',sans-serif;
background:#f5efe6;
color:#4d3a26;
}

.container{
width:min(100%,980px);
margin:auto;
background:white;
border-radius:24px;
box-shadow:0 14px 40px rgba(0,0,0,.08);
padding:24px;
}

.main-title{
margin:0;
font-family:'Cairo',sans-serif;
font-size:clamp(24px,4vw,38px);
font-weight:800;
background:linear-gradient(90deg,#7e5a21,#d4af37,#7e5a21);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
text-align:center;
}

.company-subtitle{
margin-top:8px;
text-align:center;
color:#8a6a3a;
font-weight:700;
font-size:clamp(14px,2vw,18px);
}

.preview-card{display:flex;justify-content:center;margin-top:20px;}

.image-box{position:relative;width:min(100%,720px);}

.image-box img{width:100%;height:auto;border-radius:18px;}

/* نسخة الكمبيوتر */
#nameOverlay{
position:absolute;
left:50%;
transform:translateX(-50%);
bottom:calc(14.7% - 45px);
width:33.2%;
text-align:center;
font-family:'Cairo',sans-serif;
font-weight:800;
font-size:25px;
color:#8a6422;
white-space:nowrap;
pointer-events:none;
}

/* نسخة الجوال */
@media(max-width:640px){
#nameOverlay{
font-size:15px;
bottom:calc(14.7% - 18px);
}
}

.controls{
width:min(100%,520px);
margin:22px auto 0;
display:grid;
gap:12px;
}

#nameInput{
height:52px;
border-radius:14px;
border:1px solid rgba(184,138,59,.3);
padding:0 16px;
font-size:16px;
text-align:center;
font-family:'Tajawal',sans-serif;
}

button{
min-height:52px;
border:none;
border-radius:16px;
font-family:'Cairo',sans-serif;
font-size:17px;
font-weight:800;
color:#fff;
cursor:pointer;
background:linear-gradient(135deg,#7e5a21,#c79b43,#e0bc67,#b6852f,#7e5a21);
}
</style>
</head>

<body>

<div class="container">

<h1 class="main-title">بطاقة تهنئة رسمية بعيد الفطر المبارك</h1>
<div class="company-subtitle">شركة ساطع لخدمات السيارات</div>

<div class="preview-card">
<div class="image-box">
<img id="preview" src= + img_src +  >
<div id="nameOverlay"></div>
</div>
</div>

<div class="controls">
<input type="text" id="nameInput" placeholder="اكتب الاسم هنا"
oninput="document.getElementById('nameOverlay').textContent=this.value">
<button onclick="downloadGreeting()">تنزيل التهنئة</button>
</div>

</div>

<script>
async function downloadGreeting(){

const img=document.getElementById("preview");
const overlay=document.getElementById("nameOverlay");
const name=overlay.textContent||"";

await document.fonts.ready;

const canvas=document.createElement("canvas");
const ctx=canvas.getContext("2d");

canvas.width=img.naturalWidth;
canvas.height=img.naturalHeight;

ctx.drawImage(img,0,0,canvas.width,canvas.height);

/* نفس حجم الخط الظاهر */
const style=getComputedStyle(overlay);
const fontSize=parseFloat(style.fontSize);

/* تحويله لنفس المقياس */
const scale=canvas.width/img.clientWidth;
const exportFont=fontSize*scale;

ctx.textAlign="center";
ctx.textBaseline="middle";
ctx.direction="rtl";
ctx.fillStyle="#8a6422";
ctx.font="800 "+exportFont+"px Cairo";

const x=canvas.width/2;
const y=canvas.height-181;

ctx.fillText(name,x,y);

const link=document.createElement("a");
link.download="eid_greeting.png";
link.href=canvas.toDataURL("image/png");
link.click();
}
</script>

</body>
</html>
